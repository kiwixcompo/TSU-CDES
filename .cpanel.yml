---
deployment:
  tasks:
    - export DEPLOYPATH=/home4/tsuniity/cdes.tsuniversity.edu.ng
    - /bin/mkdir -p $DEPLOYPATH
    - /bin/cp -R * $DEPLOYPATH/
    - find $DEPLOYPATH -type d -exec chmod 755 {} \;
    - rm -rf $DEPLOYPATH/.git* 2>/dev/null || true
    - rm -f $DEPLOYPATH/.cpanel.yml 2>/dev/null || true
    - export PATH=/opt/cpanel/ea-nodejs20/bin:$PATH
    - cd $DEPLOYPATH && npm install --production=false > npm-install.log 2>&1
    - cd $DEPLOYPATH && npm run build > npm-build.log 2>&1
